<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY Genesia - Tables de sonde gasoil</title>
<style>
body{font-family:Arial,sans-serif;background:#0f1720;color:white;margin:0;padding:14px}
.container{max-width:720px;margin:auto;background:#172331;padding:16px;border-radius:16px}
h1{text-align:center;font-size:22px;margin:5px 0}
.sub{text-align:center;color:#aebdcc;font-size:13px;margin-bottom:15px}
.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:15px}
.tab{padding:12px;border:0;border-radius:10px;background:#26384a;color:white;font-weight:bold}
.tab.active{background:#00b894}
.panel{display:none}
.panel.active{display:block}
label{display:block;margin-top:12px;font-weight:bold}
select,input{width:100%;padding:13px;border:0;border-radius:10px;font-size:17px;box-sizing:border-box}
button.calc{width:100%;padding:15px;margin-top:16px;border:0;border-radius:10px;background:#00b894;color:white;font-size:18px;font-weight:bold}
.result{margin-top:16px;background:#0b121a;padding:16px;border-radius:12px;text-align:center}
.big{font-size:31px;color:#00e6b8;font-weight:bold}
.med{font-size:21px;margin-top:6px}
.warn{color:#ffcc66;margin-top:8px;font-size:14px}
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
td,th{border-bottom:1px solid #2d3d4f;padding:8px;text-align:right}
td:first-child,th:first-child{text-align:left}
.total{font-size:28px;color:#00e6b8;font-weight:bold}
.small{font-size:12px;color:#aab8c5;margin-top:8px}
</style>
</head>
<body>

<div class="container">
<h1>MY Genesia - Gasoil</h1>
<div class="sub">Tables de sonde / ROB / Avitaillement / Charter</div>

<div class="tabs">
<button class="tab active" onclick="openTab('sonde',this)">Sonde ➜ L</button>
<button class="tab" onclick="openTab('litres',this)">L ➜ Sonde</button>
<button class="tab" onclick="openTab('avitail',this)">Avitaillement</button>
<button class="tab" onclick="openTab('rob',this)">ROB</button>
<button class="tab" onclick="openTab('charter',this)">Charter</button>
</div>

<div id="sonde" class="panel active">
<label>Tank</label><select id="tank1"></select>
<label>Hauteur de sonde en mm</label><input id="mm1" type="number" placeholder="Ex : 750">
<button class="calc" onclick="calcSonde()">Calculer</button>
<div id="res1" class="result">Entre une hauteur.</div>
</div>

<div id="litres" class="panel">
<label>Tank</label><select id="tank2"></select>
<label>Litres</label><input id="l2" type="number" placeholder="Ex : 4500">
<button class="calc" onclick="calcLitres()">Calculer</button>
<div id="res2" class="result">Entre une quantité.</div>
</div>

<div id="avitail" class="panel">
<label>Tank</label><select id="tank3"></select>
<label>Niveau actuel en mm</label><input id="mm3" type="number" placeholder="Ex : 700">
<label>Quantité à embarquer en litres</label><input id="add3" type="number" placeholder="Ex : 1500">
<button class="calc" onclick="calcAvitail()">Calculer niveau final</button>
<div id="res3" class="result">Entre les données.</div>
</div>

<div id="rob" class="panel">
<div id="robInputs"></div>
<button class="calc" onclick="calcROB()">Calculer ROB total</button>
<div id="resRob" class="result">Entre les sondes des 5 tanks.</div>
</div>

<div id="charter" class="panel">
<label>Date début charter</label><input id="dateStart" type="date">
<label>ROB début en litres</label><input id="robStart" type="number" placeholder="Ex : 42000">
<label>Date fin charter</label><input id="dateEnd" type="date">
<label>ROB fin en litres</label><input id="robEnd" type="number" placeholder="Ex : 28500">
<button class="calc" onclick="calcCharter()">Calculer consommation charter</button>
<div id="resCharter" class="result">Entre les ROB début et fin.</div>
</div>

</div>

<script>
const aftSide=[[50,0,0],[100,0.2,0.02],[150,0.8,0.05],[163,1,0.06],[200,1.8,0.11],[250,3.3,0.20],[300,5.4,0.33],[350,8.2,0.49],[400,11.6,0.69],[450,15.6,0.94],[500,20.4,1.22],[550,26,1.56],[600,32.4,1.94],[650,39.4,2.36],[700,47,2.81],[750,55,3.29],[800,63.2,3.78],[850,71.7,4.29],[900,80.4,4.81],[950,89.2,5.34],[999,98,5.86],[1000,98.2,5.88],[1010,100,5.98]];
const aftCentre=[[50,0.3,0.03],[100,0.8,0.10],[110,1,0.12],[150,1.7,0.21],[200,3.1,0.37],[250,5.1,0.61],[300,7.7,0.92],[350,11,1.31],[400,14.9,1.78],[450,19.4,2.33],[500,24.4,2.92],[550,29.7,3.56],[600,35.4,4.23],[650,41.3,4.94],[700,47.4,5.67],[750,53.5,6.41],[800,59.6,7.14],[850,65.7,7.87],[900,71.8,8.60],[950,78,9.34],[1000,84.1,10.07],[1050,90.2,10.80],[1100,96.3,11.54],[1114,98,11.74],[1130,100,11.98]];
const fwdSide=[[100,0.8,0.13],[111,1,0.17],[200,3.5,0.58],[300,7.8,1.28],[400,13,2.16],[500,19,3.14],[600,25.3,4.19],[700,32,5.29],[800,38.9,6.44],[900,46,7.62],[1000,53.4,8.84],[1100,60.9,10.08],[1200,68.5,11.35],[1300,76.4,12.65],[1400,84.3,13.96],[1500,92.3,15.29],[1570,98,16.23],[1594,100,16.56]];

const tanks={
aftPort:{name:"Fuel Aft Port",table:aftSide},
aftStbd:{name:"Fuel Aft Stbd",table:aftSide},
aftCentre:{name:"Fuel Aft Centre",table:aftCentre},
fwdPort:{name:"Fuel Fwd Port",table:fwdSide},
fwdStbd:{name:"Fuel Fwd Stbd",table:fwdSide}
};

function fillSelects(){
["tank1","tank2","tank3"].forEach(id=>{
let s=document.getElementById(id);
for(let k in tanks){s.innerHTML+=`<option value="${k}">${tanks[k].name}</option>`}
});
let r=document.getElementById("robInputs");
for(let k in tanks){r.innerHTML+=`<label>${tanks[k].name} - sonde en mm</label><input id="rob_${k}" type="number" placeholder="mm">`}
}
fillSelects();

function openTab(id,btn){
document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");btn.classList.add("active");
}

function interpMM(table,mm){
if(mm<=table[0][0])return {p:table[0][1],l:table[0][2]*1000,w:"Valeur sous minimum table"};
if(mm>=table.at(-1)[0])return {p:table.at(-1)[1],l:table.at(-1)[2]*1000,w:"Valeur au-dessus maximum table"};
for(let i=0;i<table.length-1;i++){
let a=table[i],b=table[i+1];
if(mm>=a[0]&&mm<=b[0]){
let r=(mm-a[0])/(b[0]-a[0]);
return {p:a[1]+r*(b[1]-a[1]),l:(a[2]+r*(b[2]-a[2]))*1000,w:""};
}}
}

function interpL(table,l){
let arr=table.map(x=>[x[0],x[1],x[2]*1000]);
if(l<=arr[0][2])return {mm:arr[0][0],p:arr[0][1],w:"Litres sous minimum table"};
if(l>=arr.at(-1)[2])return {mm:arr.at(-1)[0],p:arr.at(-1)[1],w:"Litres au-dessus capacité max"};
for(let i=0;i<arr.length-1;i++){
let a=arr[i],b=arr[i+1];
if(l>=a[2]&&l<=b[2]){
let r=(l-a[2])/(b[2]-a[2]);
return {mm:a[0]+r*(b[0]-a[0]),p:a[1]+r*(b[1]-a[1]),w:""};
}}
}

function maxL(k){return tanks[k].table.at(-1)[2]*1000}

function calcSonde(){
let k=tank1.value,mm=parseFloat(mm1.value);
if(isNaN(mm)){res1.innerHTML="Hauteur invalide";return}
let d=interpMM(tanks[k].table,mm);
res1.innerHTML=`<div class="big">${d.l.toFixed(0)} L</div><div class="med">${d.p.toFixed(1)} %</div>${d.w?`<div class="warn">${d.w}</div>`:""}<div class="small">${tanks[k].name}</div>`;
}

function calcLitres(){
let k=tank2.value,l=parseFloat(l2.value);
if(isNaN(l)){res2.innerHTML="Litres invalides";return}
let d=interpL(tanks[k].table,l);
res2.innerHTML=`<div class="big">${d.mm.toFixed(0)} mm</div><div class="med">${d.p.toFixed(1)} %</div>${d.w?`<div class="warn">${d.w}</div>`:""}<div class="small">${tanks[k].name}</div>`;
}

function calcAvitail(){
let k=tank3.value,mm=parseFloat(mm3.value),add=parseFloat(add3.value);
if(isNaN(mm)||isNaN(add)){res3.innerHTML="Données invalides";return}
let now=interpMM(tanks[k].table,mm).l;
let final=now+add;
let max=maxL(k);
let d=interpL(tanks[k].table,final);
res3.innerHTML=`<div>Actuel : ${now.toFixed(0)} L</div><div>Ajout : ${add.toFixed(0)} L</div><div class="big">${final.toFixed(0)} L</div><div class="med">Sonde finale : ${d.mm.toFixed(0)} mm</div><div>${d.p.toFixed(1)} %</div>${final>max?`<div class="warn">Attention : dépasse capacité max de ${(final-max).toFixed(0)} L</div>`:""}`;
}

function calcROB(){
let total=0,cap=0,rows="";
for(let k in tanks){
let v=parseFloat(document.getElementById("rob_"+k).value);
let l=0,p=0;
if(!isNaN(v)){let d=interpMM(tanks[k].table,v);l=d.l;p=d.p}
total+=l;cap+=maxL(k);
rows+=`<tr><td>${tanks[k].name}</td><td>${l.toFixed(0)} L</td><td>${p.toFixed(1)} %</td></tr>`;
}
let pct=total/cap*100;
resRob.innerHTML=`<div class="total">ROB : ${total.toFixed(0)} L</div><div class="med">${pct.toFixed(1)} % global</div><div>Capacité restante : ${(cap-total).toFixed(0)} L</div><table><tr><th>Tank</th><th>Litres</th><th>%</th></tr>${rows}</table>`;
}

function calcCharter(){
let s=parseFloat(robStart.value),e=parseFloat(robEnd.value);
if(isNaN(s)||isNaN(e)){resCharter.innerHTML="ROB invalide";return}
let conso=s-e;
let days="";
if(dateStart.value&&dateEnd.value){
let d1=new Date(dateStart.value),d2=new Date(dateEnd.value);
let diff=(d2-d1)/(1000*3600*24);
if(diff>0)days=`<div>Durée : ${diff.toFixed(1)} jours</div><div>Conso moyenne : ${(conso/diff).toFixed(0)} L/jour</div>`;
}
resCharter.innerHTML=`<div class="big">${conso.toFixed(0)} L</div><div class="med">Consommation totale charter</div>${days}<div class="small">Calcul : ROB début - ROB fin</div>`;
}
</script>
</body>
</html>

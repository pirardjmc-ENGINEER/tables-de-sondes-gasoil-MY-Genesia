<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tables de sonde gasoil - MY Genesia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 520px;
      margin: auto;
      background: #182430;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0,0,0,0.35);
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #b8c7d9;
      margin-bottom: 22px;
      font-size: 14px;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    select, input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #00b894;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    .result {
      margin-top: 22px;
      padding: 18px;
      background: #0d141c;
      border-radius: 12px;
      text-align: center;
    }
    .big {
      font-size: 34px;
      font-weight: bold;
      color: #00e6b8;
    }
    .medium {
      font-size: 22px;
      margin-top: 8px;
    }
    .warning {
      color: #ffcc66;
      margin-top: 12px;
      font-size: 14px;
    }
    .small {
      color: #aab8c5;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Tables de sonde gasoil</h1>
  <div class="subtitle">MY Genesia - lecture en mm / résultat en litres</div>

  <label for="tank">Choisir le tank</label>
  <select id="tank">
    <option value="aftPort">1 - Fuel Aft Port</option>
    <option value="aftStbd">2 - Fuel Aft Stbd</option>
    <option value="aftCentre">3 - Fuel Aft Centre</option>
    <option value="fwdPort">4 - Fuel Fwd Port</option>
    <option value="fwdStbd">5 - Fuel Fwd Stbd</option>
  </select>

  <label for="sounding">Hauteur de sonde en mm</label>
  <input id="sounding" type="number" placeholder="Exemple : 750" inputmode="decimal" />

  <button onclick="calculate()">Calculer</button>

  <div class="result" id="result">
    Entre une hauteur de sonde.
  </div>
</div>

<script>
const aftSide = [
  [50,0.0,0.00],
  [100,0.2,0.02],
  [150,0.8,0.05],
  [163,1.0,0.06],
  [200,1.8,0.11],
  [250,3.3,0.20],
  [300,5.4,0.33],
  [350,8.2,0.49],
  [400,11.6,0.69],
  [450,15.6,0.94],
  [500,20.4,1.22],
  [550,26.0,1.56],
  [600,32.4,1.94],
  [650,39.4,2.36],
  [700,47.0,2.81],
  [750,55.0,3.29],
  [800,63.2,3.78],
  [850,71.7,4.29],
  [900,80.4,4.81],
  [950,89.2,5.34],
  [999,98.0,5.86],
  [1000,98.2,5.88],
  [1010,100.0,5.98]
];

const aftCentre = [
  [50,0.3,0.03],
  [100,0.8,0.10],
  [110,1.0,0.12],
  [150,1.7,0.21],
  [200,3.1,0.37],
  [250,5.1,0.61],
  [300,7.7,0.92],
  [350,11.0,1.31],
  [400,14.9,1.78],
  [450,19.4,2.33],
  [500,24.4,2.92],
  [550,29.7,3.56],
  [600,35.4,4.23],
  [650,41.3,4.94],
  [700,47.4,5.67],
  [750,53.5,6.41],
  [800,59.6,7.14],
  [850,65.7,7.87],
  [900,71.8,8.60],
  [950,78.0,9.34],
  [1000,84.1,10.07],
  [1050,90.2,10.80],
  [1100,96.3,11.54],
  [1114,98.0,11.74],
  [1130,100.0,11.98]
];

const fwdSide = [
  [100,0.8,0.13],
  [111,1.0,0.17],
  [200,3.5,0.58],
  [300,7.8,1.28],
  [400,13.0,2.16],
  [500,19.0,3.14],
  [600,25.3,4.19],
  [700,32.0,5.29],
  [800,38.9,6.44],
  [900,46.0,7.62],
  [1000,53.4,8.84],
  [1100,60.9,10.08],
  [1200,68.5,11.35],
  [1300,76.4,12.65],
  [1400,84.3,13.96],
  [1500,92.3,15.29],
  [1570,98.0,16.23],
  [1594,100.0,16.56]
];

const tanks = {
  aftPort: aftSide,
  aftStbd: aftSide,
  aftCentre: aftCentre,
  fwdPort: fwdSide,
  fwdStbd: fwdSide
};

function interpolate(table, mm) {
  if (mm <= table[0][0]) return { percent: table[0][1], m3: table[0][2], warning: "Sonde sous ou égale au minimum de la table." };
  if (mm >= table[table.length - 1][0]) return { percent: table[table.length - 1][1], m3: table[table.length - 1][2], warning: "Sonde au-dessus ou égale au maximum de la table." };

  for (let i = 0; i < table.length - 1; i++) {
    const [mm1, p1, m31] = table[i];
    const [mm2, p2, m32] = table[i + 1];

    if (mm >= mm1 && mm <= mm2) {
      const ratio = (mm - mm1) / (mm2 - mm1);
      return {
        percent: p1 + ratio * (p2 - p1),
        m3: m31 + ratio * (m32 - m31),
        warning: ""
      };
    }
  }
}

function calculate() {
  const tankKey = document.getElementById("tank").value;
  const mm = parseFloat(document.getElementById("sounding").value);
  const resultDiv = document.getElementById("result");

  if (isNaN(mm)) {
    resultDiv.innerHTML = "Entre une hauteur de sonde valide.";
    return;
  }

  const data = interpolate(tanks[tankKey], mm);
  const litres = data.m3 * 1000;

  resultDiv.innerHTML = `
    <div>Hauteur : <strong>${mm.toFixed(0)} mm</strong></div>
    <div class="big">${litres.toFixed(0)} L</div>
    <div class="medium">${data.percent.toFixed(1)} % plein</div>
    ${data.warning ? `<div class="warning">${data.warning}</div>` : ""}
    <div class="small">Calcul par interpolation entre deux points de table.</div>
  `;
}
</script>

</body>
</html>
